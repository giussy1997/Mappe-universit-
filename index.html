<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hub">
<link rel="manifest" href="manifest.json">
<title>Hub Applicativi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #22263a;
    --border:    #2e3348;
    --accent:    #5b8dee;
    --text:      #e8eaf0;
    --muted:     #7a7f99;
    --danger:    #e05b6b;
    --success:   #4caf87;
    --sidebar-w: 272px;
    --header-h:  52px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 20;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--muted); }

  .header-center {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .header-center.loaded { color: var(--text); font-weight: 500; }

  .header-actions { display: flex; gap: 6px; align-items: center; }

  .menu-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .menu-toggle:hover { background: var(--surface2); }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 7px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: none; font-family: inherit; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover  { color: var(--text); border-color: var(--accent); }

  /* ── LAYOUT ── */
  .layout { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
    transition: transform .25s ease;
  }

  .sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-search input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-size: 13px; padding: 7px 10px;
    outline: none; font-family: inherit;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--muted); }

  .sidebar-body { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── GRUPPO (livello 1) ── */
  .group-header {
    display: flex; align-items: center;
    padding: 8px 12px 5px; gap: 7px;
    cursor: pointer; user-select: none;
  }
  .group-header:hover .group-label { color: var(--text); }
  .group-icon { font-size: 13px; }
  .group-label {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); flex: 1;
  }
  .group-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .group-toggle { font-size: 9px; color: var(--muted); transition: transform .2s; }
  .group-toggle.open { transform: rotate(90deg); }

  /* ── CATEGORIA (livello 2) ── */
  .category-header {
    display: flex; align-items: center;
    padding: 5px 12px 4px 24px; gap: 7px;
    cursor: pointer; user-select: none;
  }
  .category-header:hover .cat-label { color: var(--text); }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cat-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); flex: 1;
  }
  .cat-count { font-size: 10px; background: var(--surface2); color: var(--muted); padding: 1px 6px; border-radius: 10px; }
  .cat-toggle { font-size: 9px; color: var(--muted); transition: transform .2s; }
  .cat-toggle.open { transform: rotate(90deg); }

  /* categorie senza gruppo (livello 1 diretto) */
  .category-header.root {
    padding-left: 12px;
  }

  /* ── FILE (livello 3) ── */
  .file-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px 7px 40px;
    cursor: pointer; transition: background .1s; position: relative;
  }
  .file-item.root-file { padding-left: 27px; }
  .file-item:hover { background: var(--surface2); }
  .file-item.active { background: rgba(91,141,238,.13); }
  .file-item.active::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .file-icon { font-size: 13px; flex-shrink: 0; }
  .file-name { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .sidebar-empty {
    padding: 28px 16px; text-align: center;
    color: var(--muted); font-size: 13px; line-height: 1.7;
  }

  .sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 15;
  }

  /* ── MAIN ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .iframe-wrap { flex: 1; position: relative; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; background: #fff; display: none; }

  .welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 14px; color: var(--muted);
    padding: 20px; text-align: center;
  }
  .welcome-icon { font-size: 48px; opacity: .35; }
  .welcome h2 { font-size: 17px; font-weight: 500; color: var(--text); }
  .welcome p { font-size: 13px; max-width: 280px; line-height: 1.65; }

  /* update banner */
  .update-banner {
    display: none; background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 8px 16px; font-size: 12px; color: var(--text);
    align-items: center; gap: 10px; flex-shrink: 0;
  }
  .update-banner.show { display: flex; }
  .update-banner span { flex: 1; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px;
    font-size: 13px; color: var(--text); z-index: 300;
    opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.ok   { border-left: 3px solid var(--success); }
  .toast.err  { border-left: 3px solid var(--danger); }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    :root { --sidebar-w: 260px; }
    .menu-toggle { display: flex; }
    aside {
      position: fixed; left: 0; top: 0; bottom: 0;
      z-index: 16; transform: translateX(-100%);
    }
    aside.open { transform: translateX(0); }
    .sidebar-backdrop.open { display: block; }
    .logo { display: none; }
  }
</style>
</head>
<body>

<header>
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
  <div class="logo">hub<span>/</span>app</div>
  <div class="header-center" id="headerTitle">Seleziona un applicativo</div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="newTabBtn" style="display:none" onclick="openNewTab()">↗</button>
    <button class="btn btn-ghost" onclick="reloadApps()" title="Aggiorna lista">↺</button>
  </div>
</header>

<div class="update-banner" id="updateBanner">
  <span>🔄 Nuova versione disponibile</span>
  <button class="btn btn-primary" onclick="applyUpdate()">Aggiorna</button>
  <button class="btn btn-ghost" onclick="document.getElementById('updateBanner').classList.remove('show')">✕</button>
</div>

<div class="layout">
  <div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar()"></div>

  <aside id="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Cerca…" oninput="renderSidebar()">
    </div>
    <div class="sidebar-body" id="sidebarBody">
      <div class="sidebar-empty">Caricamento…</div>
    </div>
  </aside>

  <main>
    <div class="iframe-wrap" id="iframeWrap">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🗂</div>
        <h2>Hub Applicativi</h2>
        <p>Seleziona un applicativo dalla lista a sinistra.</p>
      </div>
      <iframe id="mainFrame" title="Applicativo"></iframe>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let config = { groups: [], categories: [], apps: [] };
let activeId = null;
let newWorker = null;

// ── SERVICE WORKER ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller)
          document.getElementById('updateBanner').classList.add('show');
      });
    });
  });
}
function applyUpdate() {
  if (newWorker) newWorker.postMessage({ type: 'SKIP_WAITING' });
  window.location.reload();
}

// ── CARICA CONFIG ───────────────────────────────────────────────────────────
async function loadApps() {
  try {
    const res = await fetch('apps.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    config = await res.json();
    if (!config.groups) config.groups = [];
    renderSidebar();
  } catch(e) {
    document.getElementById('sidebarBody').innerHTML =
      `<div class="sidebar-empty">Impossibile caricare <code>apps.json</code>.<br>Controlla la connessione o il file.</div>`;
  }
}

function reloadApps() {
  document.getElementById('sidebarBody').innerHTML = '<div class="sidebar-empty">Aggiornamento…</div>';
  loadApps().then(() => toast('Lista aggiornata', 'ok'));
}

// ── RENDER SIDEBAR ──────────────────────────────────────────────────────────
function renderSidebar() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const body = document.getElementById('sidebarBody');

  const apps = q ? config.apps.filter(a => a.label.toLowerCase().includes(q)) : config.apps;

  if (config.apps.length === 0) {
    body.innerHTML = `<div class="sidebar-empty">Nessun applicativo in <code>apps.json</code>.</div>`;
    return;
  }

  let html = '';

  // ── GRUPPI (con le loro categorie dentro) ──
  config.groups.forEach(group => {
    const groupCats = config.categories.filter(c => c.groupId === group.id);
    // conta i file del gruppo
    const groupAppCount = apps.filter(a => groupCats.some(c => c.id === a.categoryId)).length;
    if (q && groupAppCount === 0) return;

    const gOpen = group._open !== false;
    html += `<div>
      <div class="group-header" onclick="toggleGroup('${group.id}')">
        <span class="group-dot" style="background:${group.color}"></span>
        <span class="group-icon">${group.icon || ''}</span>
        <span class="group-label">${group.name}</span>
        <span class="cat-count">${config.apps.filter(a => groupCats.some(c => c.id === a.categoryId)).length}</span>
        <span class="group-toggle ${gOpen ? 'open' : ''}">▶</span>
      </div>`;

    if (gOpen) {
      groupCats.forEach(cat => {
        html += renderCategory(cat, apps, false);
      });
    }
    html += `</div>`;
  });

  // ── CATEGORIE SENZA GRUPPO ──
  const ungroupedCats = config.categories.filter(c => !c.groupId || !config.groups.find(g => g.id === c.groupId));
  ungroupedCats.forEach(cat => {
    html += renderCategory(cat, apps, true);
  });

  // ── FILE SENZA CATEGORIA ──
  const uncategorized = apps.filter(a => !a.categoryId || !config.categories.find(c => c.id === a.categoryId));
  if (uncategorized.length > 0) {
    html += `<div><div class="category-header root">
      <div class="cat-dot" style="background:var(--muted)"></div>
      <span class="cat-label">Altro</span>
      <span class="cat-count">${uncategorized.length}</span>
    </div>`;
    uncategorized.forEach(a => { html += fileItemHtml(a, true); });
    html += `</div>`;
  }

  if (!html) html = `<div class="sidebar-empty">Nessun risultato per "<strong>${q}</strong>"</div>`;
  body.innerHTML = html;
}

function renderCategory(cat, apps, isRoot) {
  const items = apps.filter(a => a.categoryId === cat.id);
  const allItems = config.apps.filter(a => a.categoryId === cat.id);
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q && items.length === 0) return '';

  const cOpen = cat._open !== false;
  const headerClass = isRoot ? 'category-header root' : 'category-header';

  let html = `<div>
    <div class="${headerClass}" onclick="toggleCat('${cat.id}')">
      <div class="cat-dot" style="background:${cat.color}"></div>
      <span class="cat-label">${cat.icon || ''} ${cat.name}</span>
      <span class="cat-count">${allItems.length}</span>
      <span class="cat-toggle ${cOpen ? 'open' : ''}">▶</span>
    </div>`;

  if (cOpen) {
    if (items.length === 0) {
      html += `<div style="padding:3px ${isRoot ? '27px' : '40px'} 8px;font-size:12px;color:var(--muted)">Nessun file</div>`;
    } else {
      items.forEach(a => { html += fileItemHtml(a, isRoot); });
    }
  }
  html += `</div>`;
  return html;
}

function fileItemHtml(a, isRoot) {
  return `<div class="file-item ${isRoot ? 'root-file' : ''} ${a.id === activeId ? 'active' : ''}" onclick="openApp('${a.id}')">
    <span class="file-icon">📄</span>
    <span class="file-name" title="${a.label}">${a.label}</span>
  </div>`;
}

function toggleGroup(id) {
  const g = config.groups.find(x => x.id === id);
  if (g) g._open = g._open === false ? true : false;
  renderSidebar();
}
function toggleCat(id) {
  const c = config.categories.find(x => x.id === id);
  if (c) c._open = c._open === false ? true : false;
  renderSidebar();
}

// ── APRI APP ────────────────────────────────────────────────────────────────
function openApp(id) {
  const app = config.apps.find(a => a.id === id);
  if (!app) return;
  activeId = id;

  document.getElementById('welcomeScreen').style.display = 'none';
  const frame = document.getElementById('mainFrame');
  frame.style.display = 'block';
  frame.src = app.file;

  const title = document.getElementById('headerTitle');
  title.textContent = app.label;
  title.classList.add('loaded');
  document.getElementById('newTabBtn').style.display = '';
  renderSidebar();
  if (window.innerWidth <= 640) closeSidebar();
}

function openNewTab() {
  const app = config.apps.find(a => a.id === activeId);
  if (app) window.open(app.file, '_blank');
}

// ── SIDEBAR MOBILE ──────────────────────────────────────────────────────────
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const b = document.getElementById('backdrop');
  const open = s.classList.toggle('open');
  b.classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}

// ── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 2600);
}

loadApps();
</script>
</body>
</html>
